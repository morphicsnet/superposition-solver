model_name: "sshleifer/tiny-gpt2"
layer_index: 0

dataset:
  name: "loans_bias"
  n_samples: 600
  seed: 1337
  bias_strength: 0.25          # probability/threshold skew by gender
  noise: 0.05

ensemble:
  feature_dim: 1024
  top_k: 16
  seeds: [11, 23, 37]

spike:
  t_start: 0.0
  delta_t: 1.0
  min_sigmoid: 0.01
  gse_window: 0.05

stii:
  max_order_k: 2
  subset_sampling:
    enabled: false
    per_edge_samples: 32
  stability_checks:
    bootstrap: 0

acdc:
  metric: "accuracy"            # evaluate impact on downstream accuracy
  tolerance_drop: 0.02          # allow <=2% drop when pruning
  max_edges: 50                 # safety bound

metrics:
  eps: 0.05
  hist_bins: 30

outputs:
  base_dir: "outputs/causal"
  run_tag: null